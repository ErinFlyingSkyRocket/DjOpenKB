<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <title>Request timed out</title>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="/static/stylesheets/error-page.css">
    <link rel="icon" href="/static/favicon.png">
</head>
<body class="openkb-error-page">
    <main class="openkb-error-wrap">
        <section class="openkb-error-card" role="alert" aria-labelledby="error-title">
            <div class="openkb-error-header">
                <h1 id="error-title"><span class="openkb-error-icon" aria-hidden="true">!</span><span>Request timed out</span></h1>
            </div>
            <div class="openkb-error-body">
                <div class="openkb-error-code">HTTP 504</div>
                <p class="openkb-error-message">The application took too long to respond.</p>
                <p class="openkb-error-help">Please wait briefly and try again.</p>
                <div class="openkb-error-actions">
                    <a class="openkb-error-button" href="/"><span class="openkb-back-icon" aria-hidden="true">&#8592;</span><span>Back</span></a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
