user nginx;
worker_processes auto;
pid /tmp/nginx.pid;

# The container has a read-only root filesystem. Nginx writes temporary request
# files only below /tmp/nginx, which is mounted as tmpfs in docker-compose.yml.
error_log /dev/stderr warn;


events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout main;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30s;
    keepalive_requests 100;
    client_header_timeout 15s;
    client_body_timeout 15s;
    send_timeout 30s;
    reset_timedout_connection on;
    proxy_connect_timeout 15s;
    proxy_read_timeout 90s;
    proxy_send_timeout 90s;

    # Reject oversized ordinary requests at the reverse-proxy edge. The article
    # image endpoint is limited by the application to 2 MB; 3 MB allows for
    # multipart overhead. The administrator-only bulk ZIP import route has its
    # own intentionally larger limit below.
    client_max_body_size 3m;
    client_body_buffer_size 16k;
    # /tmp is a writable tmpfs in Docker. Keep the temporary paths directly
    # beneath it so Nginx can create them on first start even with a
    # read-only root filesystem.
    client_body_temp_path /tmp/client_temp 1 2;
    proxy_temp_path /tmp/proxy_temp 1 2;
    fastcgi_temp_path /tmp/fastcgi_temp 1 2;
    uwsgi_temp_path /tmp/uwsgi_temp 1 2;
    scgi_temp_path /tmp/scgi_temp 1 2;

    # Edge controls complement Django's account/MFA lockout policy. Request
    # rate limits below deliberately key only POST submissions, so normal login
    # page views and browser refreshes are not counted. The source key is the
    # TCP peer seen by Nginx. With direct firewall NAT this is the browser IP.
    # If a trusted L7 proxy/CDN is introduced later, configure
    # real_ip_header/set_real_ip_from for that proxy before relying on these
    # limits or the IP audit fields.
    map $request_method $djopenkb_write_rate_key {
        default "";
        POST    $binary_remote_addr;
    }
    limit_req_status 429;
    limit_req_log_level warn;
    limit_conn_status 429;
    limit_conn_log_level warn;
    limit_conn_zone $binary_remote_addr zone=djopenkb_conn_per_ip:10m;
    limit_req_zone $djopenkb_write_rate_key zone=djopenkb_login_per_ip:10m rate=8r/m;
    limit_req_zone $djopenkb_write_rate_key zone=djopenkb_mfa_per_ip:10m rate=10r/m;
    limit_req_zone $djopenkb_write_rate_key zone=djopenkb_ai_per_ip:10m rate=12r/m;
    limit_req_zone $djopenkb_write_rate_key zone=djopenkb_upload_per_ip:10m rate=12r/m;
    limit_req_zone $djopenkb_write_rate_key zone=djopenkb_bulk_import_per_ip:10m rate=2r/m;

    upstream django_openkb {
        server web:8000;
        keepalive 16;
    }

    # Outer Nginx allowlist for the Django Admin area.
    # Requests outside these networks receive 404 before reaching Django.
    # Replace the sample 10.65.0.0/16 range before production use. Django Site
    # settings applies a second independent allowlist.
    geo $djopenkb_admin_network_allowed {
        default 0;
        10.65.0.0/16 1;
        127.0.0.1/32 1;
        ::1/128 1;
    }

    # The service does not have its final DNS name yet. Use this unnamed default
    # server so Nginx accepts the hostname/IP forwarded by the perimeter
    # firewall. Django's strict DJANGO_ALLOWED_HOSTS remains the host-header
    # enforcement point. Replace `server_name _;` with the final DNS name and
    # add a rejecting default server block before unrestricted public rollout.
    server {
        listen 8080 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/localhost.crt;
        ssl_certificate_key /etc/nginx/certs/localhost.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;

        # Security response headers. The existing templates intentionally use
        # inline CSS/JS and a small number of inline event handlers, so removing
        # 'unsafe-inline' today would break login, article editing and admin
        # tools. It must be removed only with a separate template/static-assets
        # refactor (or a tested per-request nonce implementation).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "same-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data:; font-src 'self'; media-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; form-action 'self'" always;

        # Hide Django's default admin login endpoint completely.
        # Admins must sign in through Knowledge Repository's main login first.
        location = /admin/login {
            return 404;
        }

        location = /admin/login/ {
            return 404;
        }

        location ^~ /admin/login/ {
            return 404;
        }

        # Nginx-level outer gate for Django Admin. This intentionally duplicates
        # the normal proxy route so unapproved requests do not reach Django.
        location = /admin {
            if ($djopenkb_admin_network_allowed = 0) {
                return 404;
            }

            limit_conn djopenkb_conn_per_ip 10;
            limit_req zone=djopenkb_mfa_per_ip burst=5 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location ^~ /admin/ {
            if ($djopenkb_admin_network_allowed = 0) {
                return 404;
            }

            limit_conn djopenkb_conn_per_ip 10;
            limit_req zone=djopenkb_mfa_per_ip burst=5 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location /static/ {
            alias /app/staticfiles/;
            expires 7d;
        }

        # Login root and legacy /login/ endpoint: modest per-IP burst allowance
        # for form retries, then return 429 before application/AD work begins.
        location = / {
            limit_conn djopenkb_conn_per_ip 10;
            limit_req zone=djopenkb_login_per_ip burst=5 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location = /login/ {
            limit_conn djopenkb_conn_per_ip 10;
            limit_req zone=djopenkb_login_per_ip burst=5 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location = /mfa/setup/ {
            limit_conn djopenkb_conn_per_ip 10;
            limit_req zone=djopenkb_mfa_per_ip burst=6 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location = /mfa/verify/ {
            limit_conn djopenkb_conn_per_ip 10;
            limit_req zone=djopenkb_mfa_per_ip burst=6 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location = /admin/mfa/verify/ {
            if ($djopenkb_admin_network_allowed = 0) {
                return 404;
            }

            limit_conn djopenkb_conn_per_ip 10;
            limit_req zone=djopenkb_mfa_per_ip burst=5 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location = /ask-openkb-ai/ {
            limit_conn djopenkb_conn_per_ip 5;
            limit_req zone=djopenkb_ai_per_ip burst=4 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location = /article-image-upload/ {
            limit_conn djopenkb_conn_per_ip 5;
            limit_req zone=djopenkb_upload_per_ip burst=6 nodelay;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        # Only this already-authorised admin import endpoint may receive a ZIP
        # archive as large as the application's own 100 MB validation limit.
        location = /profile/admin/bulk-articles/import/ {
            if ($djopenkb_admin_network_allowed = 0) {
                return 404;
            }

            client_max_body_size 100m;
            limit_conn djopenkb_conn_per_ip 3;
            limit_req zone=djopenkb_bulk_import_per_ip burst=1 nodelay;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }

        location / {
            limit_conn djopenkb_conn_per_ip 20;
            proxy_pass http://django_openkb;
            include /etc/nginx/proxy_params;
        }
    }
}
