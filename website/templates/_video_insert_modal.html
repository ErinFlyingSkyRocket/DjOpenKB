{% load i18n %}
<div class="modal fade" id="videoInsertModal" tabindex="-1" role="dialog" aria-labelledby="videoInsertModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="{% trans 'Close' %}"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="videoInsertModalLabel"><i class="fa fa-play-circle"></i> {% trans "Insert video link" %}</h4>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="videoUrl">{% trans "Video link" %}</label>
                    <input type="url" class="form-control" id="videoUrl" placeholder="https://example.com/path/to/video-or-video-page" autocomplete="off">
                    <p class="help-block">{% trans "Paste a YouTube or Vimeo link. Direct video files and links that may require external sign-in are not supported." %}</p>
                    <p id="videoUrlError" class="text-danger csp-is-hidden">{% trans "Enter a supported video link." %}</p>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">{% trans "Cancel" %}</button>
                <button type="button" class="btn btn-primary" id="insertVideoButton">{% trans "Insert video link" %}</button>
            </div>
        </div>
    </div>
</div>
