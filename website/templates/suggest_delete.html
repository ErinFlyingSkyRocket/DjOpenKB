{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Delete Suggestion - openKB</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'themes/twitter/css/style.css' %}">

    <script src="{% static 'jquery/jquery.min.js' %}"></script>
    <script src="{% static 'bootstrap/js/bootstrap.min.js' %}"></script>
</head>

<body class="show_footer">

<nav class="navbar navbar-default navbar-static-top">
    <div class="container-fluid">

        <div class="navbar-header">
            <a class="navbar-brand" href="{% url 'home' %}">
                Knowledge Repository
            </a>
        </div>

        <ul class="nav navbar-nav navbar-right">
            <li>
                <a href="{% url 'profile' %}">My Profile</a>
            </li>
        </ul>

    </div>
</nav>

<div class="container-fluid">
    <div class="col-md-6 col-md-offset-3">

        <div class="panel panel-danger" style="margin-top: 50px;">

            <div class="panel-heading">
                Delete suggested article
            </div>

            <div class="panel-body">

                <p>
                    Are you sure you want to delete
                    <strong>{{ article.title }}</strong>?
                </p>

                <p class="text-muted">
                    This removes the private profile record and deletes the
                    Markdown files from OpenKB raw/source storage.
                </p>

                <form method="post" action="{% url 'delete_suggestion' article.id %}">
                    {% csrf_token %}

                    <button class="btn btn-danger" type="submit">
                        Delete
                    </button>

                    <a class="btn btn-default" href="{% url 'profile' %}">
                        Cancel
                    </a>
                </form>

            </div>

        </div>

    </div>
</div>

</body>
</html>
