{% extends "admin/base_site.html" %}
{% load i18n language_choices %}

{% block extrastyle %}
{{ block.super }}
<style nonce="{{ csp_nonce }}">
  #content { max-width: none; }
  .change-list #content-main { overflow-x: auto; padding-bottom: 1rem; }
  .change-list #result_list { min-width: 1100px; }
  .change-list .actions,
  .change-list .paginator {
    position: sticky;
    left: 0;
    z-index: 2;
    background: var(--body-bg);
  }
  .djopenkb-admin-language {
    margin-top: 0.75rem;
    display: flex;
    gap: 0.4rem;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .djopenkb-admin-language label { font-weight: 600; }
  .djopenkb-admin-language select { min-width: 150px; }
  .djopenkb-admin-guide { max-width: 920px; line-height: 1.5; }
  .djopenkb-admin-guide-wide { max-width: 980px; }
  .djopenkb-admin-guide-compact { max-width: 900px; }
  .djopenkb-admin-guide-table { border-collapse: collapse; margin-top: 8px; }
  .djopenkb-admin-guide-table-spaced { margin-bottom: 8px; }
  .djopenkb-admin-guide-help { margin-top: 8px; }
  .djopenkb-admin-guide-label {
    text-align: left;
    vertical-align: top;
    padding: 4px 12px 4px 0;
    white-space: nowrap;
  }
  .djopenkb-admin-guide-value { padding: 4px 0; }
  .djopenkb-role-guide-list { margin-left: 18px; }
  .djopenkb-mfa-status { font-weight: 600; }
  .djopenkb-mfa-status-configured { color: #0a7a2f; }
  .djopenkb-mfa-status-pending { color: #a15c00; }
  .djopenkb-mfa-status-not-configured { color: #8a1f11; }
  @media (max-width: 1024px) {
    .change-list #result_list { min-width: 980px; }
  }
</style>
{% endblock %}

{% block branding %}
{{ block.super }}
<form class="djopenkb-admin-language" action="{% url 'set_site_language' %}" method="post">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}">
  <label for="admin-language-select">{% trans "Language" %}</label>
  <select id="admin-language-select" name="language">
    {% get_current_language as CURRENT_LANGUAGE %}
    {% configured_language_choices as AVAILABLE_LANGUAGES %}
    {% for code, name in AVAILABLE_LANGUAGES %}
      <option value="{{ code }}"{% if code == CURRENT_LANGUAGE %} selected{% endif %}>{{ name }}</option>
    {% endfor %}
  </select>
  <button type="submit" class="button">{% trans "Apply" %}</button>
</form>
{% endblock %}
