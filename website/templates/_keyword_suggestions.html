{% load i18n %}
<style nonce="{{ csp_nonce }}">
    .openkb-keyword-suggestions {
        margin-top: 10px;
        padding: 10px 12px;
        border: 1px solid #dde4ea;
        border-radius: 6px;
        background: #f8fafc;
    }
    .openkb-keyword-suggestions-header {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 10px;
        margin-bottom: 6px;
    }
    .openkb-keyword-suggestions-title {
        font-weight: 600;
        color: #2c3e50;
    }
    .openkb-keyword-refresh {
        padding: 3px 10px;
        font-size: 12px;
        line-height: 1.5;
        flex: 0 0 auto;
    }
    .openkb-keyword-suggestion-chips {
        display: flex;
        flex-wrap: nowrap;
        gap: 6px;
        max-width: 100%;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 2px 0 6px;
        white-space: nowrap;
        -webkit-overflow-scrolling: touch;
    }
    .openkb-keyword-suggestion-chips::-webkit-scrollbar {
        height: 8px;
    }
    .openkb-keyword-suggestion-chips::-webkit-scrollbar-thumb {
        background: #c7d4df;
        border-radius: 10px;
    }
    .openkb-keyword-chip {
        flex: 0 0 auto;
        border: 1px solid #b8d8ee;
        background: #eef8ff;
        color: #2c6f9e;
        border-radius: 16px;
        padding: 4px 10px;
        font-size: 12px;
        line-height: 1.35;
        white-space: nowrap;
    }
    .openkb-keyword-chip:hover,
    .openkb-keyword-chip:focus {
        background: #dff1ff;
        color: #1d5f89;
        outline: none;
    }
    .openkb-keyword-empty {
        flex: 0 0 auto;
        color: #899aa6;
        font-size: 12px;
    }
    .openkb-keyword-scroll-hint {
        margin-top: 4px;
        color: #899aa6;
        font-size: 11px;
    }
    @media (max-width: 767px) {
        .openkb-keyword-suggestions-header {
            align-items: center;
            flex-wrap: wrap;
        }
    }
</style>

<div class="openkb-keyword-suggestions" id="openkbKeywordSuggestions">
    <div class="openkb-keyword-suggestions-header">
        <button type="button" class="btn btn-default btn-xs openkb-keyword-refresh" id="openkbKeywordRefresh">
            <i class="fa fa-refresh" aria-hidden="true"></i> {% trans "Refresh" %}
        </button>
        <div class="openkb-keyword-suggestions-title">
            <i class="fa fa-tags" aria-hidden="true"></i> {% trans "Suggested keywords" %}
        </div>
    </div>
    <div class="openkb-keyword-suggestion-chips" id="openkbKeywordSuggestionChips" aria-label="{% trans 'Suggested keyword list' %}">
        <span class="openkb-keyword-empty">{% trans "Click Refresh to scan the current title and article body for existing keywords." %}</span>
    </div>
    <div class="openkb-keyword-scroll-hint">{% trans "Scroll sideways to view more matching keywords." %}</div>
</div>

<script nonce="{{ csp_nonce }}" id="openkbKeywordSuggestionCatalog" type="application/json">{{ keyword_suggestion_catalog_json|default:"[]"|safe }}</script>
<script nonce="{{ csp_nonce }}">
(function () {
    const titleInput = document.getElementById("frm_kb_title");
    const keywordInput = document.getElementById("frm_kb_keywords");
    const chipContainer = document.getElementById("openkbKeywordSuggestionChips");
    const refreshButton = document.getElementById("openkbKeywordRefresh");
    const catalogScript = document.getElementById("openkbKeywordSuggestionCatalog");

    if (!keywordInput || !chipContainer || !catalogScript) {
        return;
    }

    let catalog = [];
    try {
        catalog = JSON.parse(catalogScript.textContent || "[]") || [];
    } catch (error) {
        catalog = [];
    }

    chipContainer.addEventListener("wheel", function (event) {
        if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
            chipContainer.scrollLeft += event.deltaY;
            event.preventDefault();
        }
    }, { passive: false });

    function getEditorCodeMirror() {
        const wrapper = document.querySelector(".CodeMirror");
        if (wrapper && wrapper.CodeMirror) {
            return wrapper.CodeMirror;
        }
        return null;
    }

    function getEditorValue() {
        const cm = getEditorCodeMirror();
        if (cm) {
            return cm.getValue() || "";
        }
        const textarea = document.getElementById("editor");
        return textarea ? textarea.value || "" : "";
    }

    function normaliseKeyword(value) {
        return String(value || "")
            .toLowerCase()
            .replace(/[^a-z0-9+#.\- ]+/g, " ")
            .replace(/\s+/g, " ")
            .trim();
    }

    function getCurrentKeywords() {
        const keywords = [];
        if (window.jQuery && window.jQuery.fn && window.jQuery(keywordInput).data("bs.tokenfield")) {
            try {
                const tokenData = window.jQuery(keywordInput).tokenfield("getTokens") || [];
                tokenData.forEach(function (token) {
                    const value = normaliseKeyword(token.value || token.label || "");
                    if (value) {
                        keywords.push(value);
                    }
                });
            } catch (error) {}
        }

        String(keywordInput.value || "").split(/[,;\n]+/).forEach(function (item) {
            const value = normaliseKeyword(item);
            if (value) {
                keywords.push(value);
            }
        });

        return new Set(keywords);
    }

    function addKeyword(keyword) {
        keyword = normaliseKeyword(keyword);
        if (!keyword || getCurrentKeywords().has(keyword)) {
            return;
        }

        if (window.jQuery && window.jQuery.fn && window.jQuery(keywordInput).data("bs.tokenfield")) {
            window.jQuery(keywordInput).tokenfield("createToken", keyword);
            window.jQuery(keywordInput).trigger("change");
            renderSuggestions();
            return;
        }

        const current = String(keywordInput.value || "").trim();
        keywordInput.value = current ? current + ", " + keyword : keyword;
        keywordInput.dispatchEvent(new Event("change", { bubbles: true }));
        renderSuggestions();
    }

    function keywordAppearsInDraft(keyword, draftText) {
        keyword = normaliseKeyword(keyword);
        if (!keyword || !draftText) {
            return false;
        }

        // Exact normalized keyword/phrase match only.
        // Example: keyword "first article" appears only when the draft contains
        // "first article". Keyword "is" appears only as its own word, not inside "this".
        const paddedDraft = " " + draftText + " ";
        const paddedKeyword = " " + keyword + " ";
        return paddedDraft.indexOf(paddedKeyword) !== -1;
    }

    function renderSuggestions() {
        const title = titleInput ? titleInput.value || "" : "";
        const body = getEditorValue();
        const draftText = normaliseKeyword(title + " " + body);
        const currentKeywords = getCurrentKeywords();

        chipContainer.innerHTML = "";

        if (!draftText) {
            const empty = document.createElement("span");
            empty.className = "openkb-keyword-empty";
            empty.textContent = "{% trans 'Start typing the title or article body to see matching existing keywords.' %}";
            chipContainer.appendChild(empty);
            return;
        }

        const suggestions = catalog
            .map(function (candidate) {
                return {
                    keyword: normaliseKeyword(candidate.keyword),
                    usage_count: parseInt(candidate.usage_count || 0, 10)
                };
            })
            .filter(function (candidate) {
                return candidate.keyword &&
                    !currentKeywords.has(candidate.keyword) &&
                    keywordAppearsInDraft(candidate.keyword, draftText);
            })
            .sort(function (a, b) {
                if (b.usage_count !== a.usage_count) { return b.usage_count - a.usage_count; }
                return a.keyword.localeCompare(b.keyword);
            })
            .slice(0, 40);

        if (!suggestions.length) {
            const empty = document.createElement("span");
            empty.className = "openkb-keyword-empty";
            empty.textContent = "{% trans 'No existing keywords match the current title or body yet.' %}";
            chipContainer.appendChild(empty);
            return;
        }

        suggestions.forEach(function (suggestion) {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "openkb-keyword-chip";
            button.textContent = suggestion.keyword;
            button.addEventListener("click", function () {
                addKeyword(suggestion.keyword);
            });
            chipContainer.appendChild(button);
        });
    }

    function renderInitialMessage() {
        chipContainer.innerHTML = "";
        const empty = document.createElement("span");
        empty.className = "openkb-keyword-empty";
        empty.textContent = "{% trans 'Click Refresh to scan the current title and article body for existing keywords.' %}";
        chipContainer.appendChild(empty);
    }

    if (refreshButton) {
        refreshButton.addEventListener("click", function () {
            renderSuggestions();
        });
    }

    // Do not auto-scan while the user is typing. This avoids unnecessary browser work
    // and keeps suggestions predictable. The Refresh button is the only trigger.
    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", renderInitialMessage);
    } else {
        renderInitialMessage();
    }
})();
</script>
