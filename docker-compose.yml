services:
  # Vault stays private to the host and the vault-backend Docker network.
  vault:
    user: "0:0"
    image: hashicorp/vault:1.21
    container_name: djopenkb-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    security_opt:
      - no-new-privileges:true
    environment:
      VAULT_ADDR: http://127.0.0.1:8200
    entrypoint: ["vault"]
    command: ["server", "-config=/vault/config/vault.hcl"]
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - ./vault/config:/vault/config:ro
      - ./vault/file:/vault/file
      - ./vault/logs:/vault/logs
    networks:
      - vault_backend

  vault-init:
    user: "0:0"
    image: hashicorp/vault:1.21
    container_name: djopenkb-vault-init
    depends_on:
      vault:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    environment:
      VAULT_ADDR: http://vault:8200
    volumes:
      - ./vault/config:/vault/config:ro
      - ./vault/scripts:/vault/scripts:ro
      - ./vault/bootstrap:/vault/bootstrap:ro
      - ./vault/keys:/vault/keys
    entrypoint: ["/bin/sh", "/vault/scripts/init.sh"]
    restart: "no"
    networks:
      - vault_backend

  vault-auto-unseal:
    user: "0:0"
    image: hashicorp/vault:1.21
    container_name: djopenkb-vault-auto-unseal
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_started
    security_opt:
      - no-new-privileges:true
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_AUTO_UNSEAL_INTERVAL_SECONDS: ${VAULT_AUTO_UNSEAL_INTERVAL_SECONDS:-15}
    volumes:
      - ./vault/config:/vault/config:ro
      - ./vault/scripts:/vault/scripts:ro
      - ./vault/keys:/vault/keys
    entrypoint: ["/bin/sh", "/vault/scripts/auto-unseal.sh"]
    networks:
      - vault_backend

  redis:
    image: redis:7-alpine
    container_name: djopenkb-redis
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_backend

  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres-vault
    container_name: djopenkb-postgres
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-djopenkb}
      POSTGRES_USER: ${POSTGRES_USER:-djopenkb}
      VAULT_ENABLED: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN_FILE: /run/vault-keys/djopenkb-app-token.txt
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-djopenkb}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./vault/keys/djopenkb-app-token.txt:/run/vault-keys/djopenkb-app-token.txt:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djopenkb} -d ${POSTGRES_DB:-djopenkb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_backend
      - vault_backend

  # One short-lived root-only job prepares persistent mount ownership once.
  # All Python application services below then run as the unprivileged app user.
  app-permissions-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djopenkb-app-permissions-init
    user: "0:0"
    restart: "no"
    network_mode: "none"
    security_opt:
      - no-new-privileges:true
    # Keep this helper isolated from every network. It has one purpose: make
    # first-run bind mounts and the named static-files volume writable by the
    # non-root Django/worker account before application services start.
    # `-x` intentionally makes a future permission failure visible in
    # `docker compose logs app-permissions-init`, instead of masking it.
    entrypoint: ["/bin/sh", "-euxc"]
    # Use a one-item command list so Compose passes this entire script as the
    # argument to /bin/sh -c.  $$ preserves shell variables for the container
    # instead of Compose attempting to interpolate them from the host/.env.
    command:
      - |-
        prepare_directory() {
          target="$${1}"
          mkdir -p "$${target}"
          chown -R 10001:10001 "$${target}"
          chmod -R u+rwX "$${target}"
          echo "Prepared $${target} for UID/GID 10001:10001"
        }
        prepare_directory /app/staticfiles
        prepare_directory /app/openkb-data
        prepare_directory /app/openkb-data-internal
    volumes:
      - ./openkb-data:/app/openkb-data
      - ./openkb-data-internal:/app/openkb-data-internal
      - static_volume:/app/staticfiles

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djopenkb-web
    user: "10001:10001"
    restart: unless-stopped
    read_only: true
    init: true
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    depends_on:
      vault-init:
        condition: service_completed_successfully
      app-permissions-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: djopenkb.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env to the browser-facing public IP or final DNS name.}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:?Set DJANGO_CSRF_TRUSTED_ORIGINS in .env to the exact HTTPS browser origin.}"
      DJANGO_SESSION_TIMEOUT_HOURS: "${DJANGO_SESSION_TIMEOUT_HOURS:-8}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DJANGO_ALLOW_LOCAL_CACHE_FALLBACK: "${DJANGO_ALLOW_LOCAL_CACHE_FALLBACK:-false}"
      AUTH_LOCKOUT_POLICY_STAGES: "${AUTH_LOCKOUT_POLICY_STAGES:-10:300:2,5:900:2,3:3600:0}"
      AUTH_LOCKOUT_STRIKE_TTL_SECONDS: "${AUTH_LOCKOUT_STRIKE_TTL_SECONDS:-604800}"
      MFA_TOTP_ISSUER: "${MFA_TOTP_ISSUER:-Knowledge Repository}"
      MFA_TOTP_VALID_WINDOW: "${MFA_TOTP_VALID_WINDOW:-2}"
      OPENKB_BASE_DIR: ${OPENKB_BASE_DIR:-OpenKB-main}
      OPENKB_DATA_DIR: ${OPENKB_DATA_DIR:-openkb-data}
      OPENKB_INTERNAL_DATA_DIR: ${OPENKB_INTERNAL_DATA_DIR:-openkb-data-internal}
      OPENKB_AI_PROVIDER: ${OPENKB_AI_PROVIDER:-openkb-cli}
      OPENKB_AI_MODEL: ${OPENKB_AI_MODEL:-gemini/gemini-2.5-flash}
      LITELLM_DROP_PARAMS: ${LITELLM_DROP_PARAMS:-true}
      OPENKB_AI_MAX_PROMPT_CHARS: "${OPENKB_AI_MAX_PROMPT_CHARS:-1000}"
      OPENKB_AI_RATE_LIMIT_MAX_REQUESTS: "${OPENKB_AI_RATE_LIMIT_MAX_REQUESTS:-5}"
      OPENKB_AI_RATE_LIMIT_WINDOW_SECONDS: "${OPENKB_AI_RATE_LIMIT_WINDOW_SECONDS:-60}"
      OPENKB_AI_RATE_LIMIT_BLOCK_SECONDS: "${OPENKB_AI_RATE_LIMIT_BLOCK_SECONDS:-1800}"
      OPENKB_AI_TIMEOUT_SECONDS: "${OPENKB_AI_TIMEOUT_SECONDS:-90}"
      OPENKB_AI_CONCURRENCY_LIMIT: "${OPENKB_AI_CONCURRENCY_LIMIT:-2}"
      OPENKB_AI_CONCURRENCY_LOCK_SECONDS: "${OPENKB_AI_CONCURRENCY_LOCK_SECONDS:-180}"
      OPENKB_AI_JOB_TTL_SECONDS: "${OPENKB_AI_JOB_TTL_SECONDS:-1800}"
      OPENKB_AI_JOB_BUSY_RETRIES: "${OPENKB_AI_JOB_BUSY_RETRIES:-12}"
      OPENKB_AI_POLL_INTERVAL_MILLISECONDS: "${OPENKB_AI_POLL_INTERVAL_MILLISECONDS:-2000}"
      OPENKB_AI_CELERY_QUEUE: "${OPENKB_AI_CELERY_QUEUE:-openkb_ai}"
      OPENKB_AI_CELERY_BROKER_URL: "${OPENKB_AI_CELERY_BROKER_URL:-redis://redis:6379/2}"
      GUNICORN_WORKERS: "${GUNICORN_WORKERS:-4}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-300}"
      POSTGRES_DB: ${POSTGRES_DB:-djopenkb}
      POSTGRES_USER: ${POSTGRES_USER:-djopenkb}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USE_SQLITE: ${USE_SQLITE:-false}
      LDAP_ENABLED: "${LDAP_ENABLED:-false}"
      LDAP_PLACEHOLDER_ENABLED: "${LDAP_PLACEHOLDER_ENABLED:-false}"
      LDAP_PLACEHOLDER_AUTO_CREATE_USERS: "${LDAP_PLACEHOLDER_AUTO_CREATE_USERS:-false}"
      LDAP_SERVER_URI: "${LDAP_SERVER_URI:-}"
      LDAP_START_TLS: "${LDAP_START_TLS:-false}"
      LDAP_CA_CERT_FILE: "${LDAP_CA_CERT_FILE:-/etc/ssl/certs/djopenkb-ldap/ad-ca.crt}"
      LDAP_TLS_REQUIRE_CERT: "${LDAP_TLS_REQUIRE_CERT:-demand}"
      LDAP_ALLOW_INSECURE: "${LDAP_ALLOW_INSECURE:-false}"
      LDAP_NETWORK_TIMEOUT: "${LDAP_NETWORK_TIMEOUT:-5}"
      LDAP_OPERATION_TIMEOUT: "${LDAP_OPERATION_TIMEOUT:-5}"
      LDAP_AD_DOMAIN: "${LDAP_AD_DOMAIN:-}"
      LDAP_NETBIOS_DOMAIN: "${LDAP_NETBIOS_DOMAIN:-}"
      LDAP_ALLOWED_EMAIL_DOMAINS: "${LDAP_ALLOWED_EMAIL_DOMAINS:-}"
      LDAP_USER_SEARCH_BASE: "${LDAP_USER_SEARCH_BASE:-}"
      LDAP_USER_FILTER: "${LDAP_USER_FILTER:-(|(userPrincipalName=%(user)s)(sAMAccountName=%(user)s)(mail=%(user)s))}"
      LDAP_BIND_DN: "${LDAP_BIND_DN:-}"
      VAULT_ENABLED: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN_FILE: /run/vault-keys/djopenkb-app-token.txt
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-djopenkb}
      PYTHONUNBUFFERED: "1"
      HOME: /tmp
      TMPDIR: /tmp
    extra_hosts:
      - "${LDAP_EXTRA_HOSTNAME:-WIN-VVCA4BIOSK7.openkb.local}:${LDAP_DC_IP:-192.168.81.128}"
      - "${LDAP_EXTRA_SHORT_HOSTNAME:-WIN-VVCA4BIOSK7}:${LDAP_DC_IP:-192.168.81.128}"
    volumes:
      - ./openkb-data:/app/openkb-data
      - ./openkb-data-internal:/app/openkb-data-internal
      - static_volume:/app/staticfiles
      - ./vault/keys/djopenkb-app-token.txt:/run/vault-keys/djopenkb-app-token.txt:ro
      - ./ldap-certs:/etc/ssl/certs/djopenkb-ldap:ro
    expose:
      - "8000"
    networks:
      - frontend
      - app_backend
      - vault_backend
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py repair_kb_schema --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn djopenkb.wsgi:application --bind 0.0.0.0:8000 --workers ${GUNICORN_WORKERS:-4} --timeout ${GUNICORN_TIMEOUT:-300}
      "

  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    user: "10001:10001"
    restart: unless-stopped
    read_only: true
    init: true
    stop_grace_period: 2m
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m
    depends_on:
      vault-init:
        condition: service_completed_successfully
      app-permissions-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: djopenkb.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env to the browser-facing public IP or final DNS name.}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:?Set DJANGO_CSRF_TRUSTED_ORIGINS in .env to the exact HTTPS browser origin.}"
      DJANGO_SESSION_TIMEOUT_HOURS: "${DJANGO_SESSION_TIMEOUT_HOURS:-8}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DJANGO_ALLOW_LOCAL_CACHE_FALLBACK: "${DJANGO_ALLOW_LOCAL_CACHE_FALLBACK:-false}"
      OPENKB_BASE_DIR: ${OPENKB_BASE_DIR:-OpenKB-main}
      OPENKB_DATA_DIR: ${OPENKB_DATA_DIR:-openkb-data}
      OPENKB_INTERNAL_DATA_DIR: ${OPENKB_INTERNAL_DATA_DIR:-openkb-data-internal}
      OPENKB_AI_PROVIDER: ${OPENKB_AI_PROVIDER:-openkb-cli}
      OPENKB_AI_MODEL: ${OPENKB_AI_MODEL:-gemini/gemini-2.5-flash}
      LITELLM_DROP_PARAMS: ${LITELLM_DROP_PARAMS:-true}
      OPENKB_AI_MAX_PROMPT_CHARS: "${OPENKB_AI_MAX_PROMPT_CHARS:-1000}"
      OPENKB_AI_TIMEOUT_SECONDS: "${OPENKB_AI_TIMEOUT_SECONDS:-90}"
      OPENKB_AI_CONCURRENCY_LIMIT: "${OPENKB_AI_CONCURRENCY_LIMIT:-2}"
      OPENKB_AI_CONCURRENCY_LOCK_SECONDS: "${OPENKB_AI_CONCURRENCY_LOCK_SECONDS:-180}"
      OPENKB_AI_JOB_TTL_SECONDS: "${OPENKB_AI_JOB_TTL_SECONDS:-1800}"
      OPENKB_AI_JOB_BUSY_RETRIES: "${OPENKB_AI_JOB_BUSY_RETRIES:-12}"
      OPENKB_AI_CELERY_QUEUE: "${OPENKB_AI_CELERY_QUEUE:-openkb_ai}"
      OPENKB_AI_WORKER_CONCURRENCY: "${OPENKB_AI_WORKER_CONCURRENCY:-1}"
      OPENKB_AI_CELERY_BROKER_URL: "${OPENKB_AI_CELERY_BROKER_URL:-redis://redis:6379/2}"
      POSTGRES_DB: ${POSTGRES_DB:-djopenkb}
      POSTGRES_USER: ${POSTGRES_USER:-djopenkb}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USE_SQLITE: ${USE_SQLITE:-false}
      VAULT_ENABLED: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN_FILE: /run/vault-keys/djopenkb-app-token.txt
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-djopenkb}
      PYTHONUNBUFFERED: "1"
      HOME: /tmp
      TMPDIR: /tmp
    volumes:
      - ./openkb-data:/app/openkb-data
      - ./openkb-data-internal:/app/openkb-data-internal
      - ./vault/keys/djopenkb-app-token.txt:/run/vault-keys/djopenkb-app-token.txt:ro
    networks:
      - app_backend
      - vault_backend
      - egress
    command: >
      sh -c "
      celery -A djopenkb worker --loglevel=INFO
      --queues $${OPENKB_AI_CELERY_QUEUE:-openkb_ai}
      --concurrency $${OPENKB_AI_WORKER_CONCURRENCY:-1}
      --hostname openkb-ai@%h
      "

  nginx:
    image: nginx:alpine
    container_name: djopenkb-nginx
    restart: unless-stopped
    read_only: true
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    depends_on:
      - web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_volume:/app/staticfiles:ro
    networks:
      - frontend

  cleanup-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djopenkb-cleanup-scheduler
    user: "10001:10001"
    restart: unless-stopped
    read_only: true
    init: true
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    depends_on:
      vault-init:
        condition: service_completed_successfully
      app-permissions-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: djopenkb.settings
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: "${DJANGO_ALLOWED_HOSTS:?Set DJANGO_ALLOWED_HOSTS in .env to the browser-facing public IP or final DNS name.}"
      DJANGO_CSRF_TRUSTED_ORIGINS: "${DJANGO_CSRF_TRUSTED_ORIGINS:?Set DJANGO_CSRF_TRUSTED_ORIGINS in .env to the exact HTTPS browser origin.}"
      DJANGO_SESSION_TIMEOUT_HOURS: "${DJANGO_SESSION_TIMEOUT_HOURS:-8}"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      DJANGO_ALLOW_LOCAL_CACHE_FALLBACK: "${DJANGO_ALLOW_LOCAL_CACHE_FALLBACK:-false}"
      AUTH_LOCKOUT_POLICY_STAGES: "${AUTH_LOCKOUT_POLICY_STAGES:-10:300:2,5:900:2,3:3600:0}"
      AUTH_LOCKOUT_STRIKE_TTL_SECONDS: "${AUTH_LOCKOUT_STRIKE_TTL_SECONDS:-604800}"
      MFA_TOTP_ISSUER: "${MFA_TOTP_ISSUER:-Knowledge Repository}"
      MFA_TOTP_VALID_WINDOW: "${MFA_TOTP_VALID_WINDOW:-2}"
      OPENKB_BASE_DIR: ${OPENKB_BASE_DIR:-OpenKB-main}
      OPENKB_DATA_DIR: ${OPENKB_DATA_DIR:-openkb-data}
      OPENKB_INTERNAL_DATA_DIR: ${OPENKB_INTERNAL_DATA_DIR:-openkb-data-internal}
      POSTGRES_DB: ${POSTGRES_DB:-djopenkb}
      POSTGRES_USER: ${POSTGRES_USER:-djopenkb}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      USE_SQLITE: ${USE_SQLITE:-false}
      VAULT_ENABLED: "true"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN_FILE: /run/vault-keys/djopenkb-app-token.txt
      VAULT_KV_MOUNT: ${VAULT_KV_MOUNT:-secret}
      VAULT_SECRET_PATH: ${VAULT_SECRET_PATH:-djopenkb}
      PYTHONUNBUFFERED: "1"
      HOME: /tmp
      TMPDIR: /tmp
    volumes:
      - ./openkb-data:/app/openkb-data
      - ./openkb-data-internal:/app/openkb-data-internal
      - ./vault/keys/djopenkb-app-token.txt:/run/vault-keys/djopenkb-app-token.txt:ro
    networks:
      - app_backend
      - vault_backend
    command: >
      sh -c "
      sleep 60 &&
      while true; do
        python manage.py cleanup_stray_upload_files --noinput;
        python manage.py cleanup_article_deletion_queue --noinput;
        python manage.py cleanup_auth_activity_logs --noinput;
        python manage.py cleanup_activity_logs --noinput;
        sleep $${CLEANUP_INTERVAL_SECONDS:-86400};
      done
      "

networks:
  # Publicly published Nginx and the web service only.
  frontend:
    driver: bridge
  # Database and Redis are isolated from the published proxy and external host.
  app_backend:
    internal: true
  # Vault is isolated from both public Nginx and the AI provider egress path.
  vault_backend:
    internal: true
  # Only the worker needs outbound model-provider access. The web service gets
  # outbound LDAPS access through `frontend`; no database/Vault service can
  # initiate arbitrary outbound connections.
  egress:
    driver: bridge

volumes:
  static_volume:
  redis_data:
