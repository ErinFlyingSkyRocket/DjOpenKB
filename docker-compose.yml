services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djopenkb-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: djopenkb.settings
      OPENKB_BASE_DIR: OpenKB-main
      OPENKB_DATA_DIR: openkb-data
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn djopenkb.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 300
      "

  nginx:
    image: nginx:alpine
    container_name: djopenkb-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_volume:/app/staticfiles:ro

volumes:
  static_volume: