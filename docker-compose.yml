services:
  db:
    image: postgres:16-alpine
    container_name: djopenkb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-djopenkb}
      POSTGRES_USER: ${POSTGRES_USER:-djopenkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-djopenkb_password}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-djopenkb} -d ${POSTGRES_DB:-djopenkb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: djopenkb-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: djopenkb.settings
      OPENKB_BASE_DIR: OpenKB-main
      OPENKB_DATA_DIR: openkb-data
      POSTGRES_DB: ${POSTGRES_DB:-djopenkb}
      POSTGRES_USER: ${POSTGRES_USER:-djopenkb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-djopenkb_password}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      PYTHONUNBUFFERED: "1"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn djopenkb.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 300
      "

  nginx:
    image: nginx:alpine
    container_name: djopenkb-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - static_volume:/app/staticfiles:ro



cleanup-scheduler:
  build: .
  container_name: djopenkb-cleanup-scheduler
  command: >
    sh -c "while true; do
      python manage.py cleanup_stray_upload_files --noinput;
      sleep $${CLEANUP_INTERVAL_SECONDS:-86400};
    done"
  volumes:
    - .:/app
  env_file:
    - .env
  environment:
    DJANGO_SETTINGS_MODULE: djopenkb.settings
  depends_on:
    - db
  restart: unless-stopped

volumes:
  static_volume: